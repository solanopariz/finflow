services:
  db:
    image: mysql:8.0
    container_name: finflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: finflow
      MYSQL_DATABASE: finflow
      MYSQL_USER: finflow
      MYSQL_PASSWORD: finflow
    ports:
      - "3306:3306"
    volumes:
      - finflow-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pfinflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finflow-db:
